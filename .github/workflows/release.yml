# Release: build, codesign + notarize the macOS app, and publish a GitHub
# Release with all daemon binaries + the .app .zip.
#
# Trigger: push a tag matching v* (e.g. `git tag v1.0.0 && git push --tags`).
#
# Single-job design: `scripts/package-desktop.sh` already builds the .app AND
# cross-compiles xclawd for darwin/linux/windows in one run, so doing it from
# one macOS runner is simpler than splitting across runner types — and macOS
# is the only runner that can codesign + notarize the .app anyway.
#
# Going universal for the .app (arm64 + amd64 in one binary) is the Mac
# convention since the Apple Silicon transition; a single download covers both
# architectures. Splitting into separate per-arch zips is a 10-line change to
# this workflow if we ever need it (loop over ARCH ∈ {arm64, amd64} on the
# package step), but doubles the asset count on the Releases page.
#
# Secrets — set under repo Settings → Secrets and variables → Actions:
#   APPLE_SIGN_IDENTITY      "Developer ID Application: Name (TEAMID)"
#   APPLE_CERT_P12_B64       base64 of the Developer ID cert .p12
#   APPLE_CERT_PWD           password protecting the .p12
#   APPLE_NOTARY_KEY_B64     base64 of the App Store Connect API key (.p8)
#   APPLE_NOTARY_KEY_ID      the API key id (e.g. ABCD1234EF)
#   APPLE_NOTARY_ISSUER      the issuer uuid (a UUID in App Store Connect)
# See docs/RELEASE.md for one-time setup.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # gh release create

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install Wails 3 CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend deps
        working-directory: desktop/frontend
        run: npm ci

      - name: Resolve version from tag
        id: ver
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      # Import the Developer ID cert into a fresh temp keychain so codesign can
      # find it without polluting the runner's login keychain. The temp keychain
      # is deleted in cleanup.
      - name: Import Apple Developer ID cert
        env:
          APPLE_CERT_P12_B64: ${{ secrets.APPLE_CERT_P12_B64 }}
          APPLE_CERT_PWD: ${{ secrets.APPLE_CERT_PWD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD="$(openssl rand -hex 16)"
          CERT="$RUNNER_TEMP/cert.p12"

          echo "$APPLE_CERT_P12_B64" | base64 -D > "$CERT"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security import "$CERT" -P "$APPLE_CERT_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          # Make codesign able to use the cert without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          # Prepend our temp keychain to the search list (preserving the login one).
          security list-keychain -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$CERT"
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      # Drop the .p8 API key on disk for notarytool. chmod 600 so it's tight,
      # cleanup deletes it. Never logged.
      - name: Stage Apple notary API key
        env:
          APPLE_NOTARY_KEY_B64: ${{ secrets.APPLE_NOTARY_KEY_B64 }}
        run: |
          set -euo pipefail
          KEY="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_NOTARY_KEY_B64" | base64 -D > "$KEY"
          chmod 600 "$KEY"
          echo "NOTARY_KEY_PATH=$KEY" >> "$GITHUB_ENV"

      - name: Package (universal, signed, notarized)
        env:
          XCLAW_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          XCLAW_NOTARY_KEY_PATH: ${{ env.NOTARY_KEY_PATH }}
          XCLAW_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          XCLAW_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
          XCLAW_UNIVERSAL: "1"
          XCLAW_SKIP_OCTO: "1" # the bundled octo-cli is fetched in package-desktop.sh; CI skips to avoid the gh dep dance
          GH_TOKEN: ${{ github.token }}
        run: zsh scripts/package-desktop.sh

      # Stage the daemon binaries + the .zip under versioned names so the
      # Releases page is readable. checksums.txt lets users verify.
      - name: Stage release assets
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          STAGE="$RUNNER_TEMP/release"
          mkdir -p "$STAGE"
          cp output/XClaw.zip                "$STAGE/XClaw-${VER}-macos-universal.zip"
          cp output/xclawd-darwin-arm64      "$STAGE/xclawd-${VER}-darwin-arm64"
          cp output/xclawd-darwin-amd64      "$STAGE/xclawd-${VER}-darwin-amd64"
          cp output/xclawd-linux-amd64       "$STAGE/xclawd-${VER}-linux-amd64"
          cp output/xclawd-linux-arm64       "$STAGE/xclawd-${VER}-linux-arm64"
          cp output/xclawd-windows-amd64.exe "$STAGE/xclawd-${VER}-windows-amd64.exe"
          ( cd "$STAGE" && shasum -a 256 * > checksums.txt )
          ls -la "$STAGE"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          VER="${{ steps.ver.outputs.version }}"
          # --generate-notes uses the commit history since the previous tag;
          # operators can edit the published release afterward to add a hand-
          # written summary at the top.
          gh release create "$TAG" \
            --title "XClaw $TAG" \
            --generate-notes \
            "$STAGE"/*

      - name: Cleanup secrets on disk
        if: always()
        run: |
          rm -f "${NOTARY_KEY_PATH:-}" || true
          security delete-keychain "${KEYCHAIN:-}" 2>/dev/null || true
