name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Go core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: govulncheck
        run: |
          # Pinned (not @latest) so the gate is reproducible: a new advisory or a
          # new tool release can't flip a green commit red with no code change.
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          "$(go env GOPATH)/bin/govulncheck" ./...

  cross-compile:
    name: Cross-compile (zero cgo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    strategy:
      matrix:
        target:
          - { goos: darwin, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum
      - name: build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: go build -o /dev/null ./cmd/xclawd

  desktop:
    name: Desktop (Wails) + frontend
    runs-on: ubuntu-latest
    # Wails on Linux needs cgo (GTK3 + WebKit2GTK); state it once for the whole job.
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4

      # Wails v3 on Linux links against GTK3 + WebKit2GTK 4.1 via cgo.
      - name: Install Wails Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod
          cache-dependency-path: desktop/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      # Frontend must be built first: desktop/main.go embeds frontend/dist via
      # //go:embed, so the Go build fails if the bundle is absent.
      - name: Frontend install
        working-directory: desktop/frontend
        run: npm ci

      - name: Frontend build
        working-directory: desktop/frontend
        run: npm run build

      - name: Frontend svelte-check
        working-directory: desktop/frontend
        run: npx svelte-check --tsconfig ./tsconfig.json

      - name: Desktop go vet
        working-directory: desktop
        run: go vet ./...

      # No separate `go build`: `go test` already compiles every package
      # (cgo is the slow part of this job), so a build-only step is redundant.
      - name: Desktop test (race)
        working-directory: desktop
        run: go test -race ./...
