name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Go core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

  cross-compile:
    name: Cross-compile (zero cgo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    strategy:
      matrix:
        target:
          - { goos: darwin, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum
      - name: build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: go build -o /dev/null ./cmd/xclawd

  desktop:
    name: Desktop app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod
          cache-dependency-path: desktop/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: frontend build
        working-directory: desktop/frontend
        run: |
          npm ci
          npm run build
          npm run check

      - name: go vet
        working-directory: desktop
        run: go vet ./...

      - name: go build
        working-directory: desktop
        run: go build ./...
